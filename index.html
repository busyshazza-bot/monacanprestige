<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONACAN PRESTIGE | Elite Automotive</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,700&family=Inter:wght@100;300;600&display=swap" rel="stylesheet">

    <style>
        :root { --obsidian: #050505; }
        body { 
            background-color: var(--obsidian); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            margin: 0; 
        }
        h1, h2, h3, h4, .serif { font-family: 'Bodoni Moda', serif; }

        /* Smooth scroll for navigation */
        html { scroll-behavior: smooth; }

        #enter-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        /* Floating Car Fixed Logic */
        #floating-car {
            position: fixed; 
            width: 200px; 
            z-index: 9999; 
            pointer-events: none; 
            opacity: 0; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
            transition: opacity 1s ease, transform 0.1s linear;
            will-change: transform, left, top;
        }

        .hero-bg-road {
            position: absolute; inset: 0;
            background-image: url('welcome.png'); /* Ensure this file exists */
            background-size: cover; background-position: center;
            filter: brightness(0.4) contrast(1.1); z-index: 0;
        }

        .product-image { filter: grayscale(100%) brightness(0.6); transition: 0.8s ease; }
        .group:hover .product-image { filter: grayscale(0%) brightness(1); transform: scale(1.03); }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hero-text-shadow { text-shadow: 0px 4px 30px rgba(0,0,0,0.9); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <img id="floating-car" src="https://pngimg.com/d/porsche_PNG10620.png" alt="Porsche Cursor">

    <div id="enter-overlay">
        <div class="text-[10px] tracking-[1.5em] mb-12 opacity-30 uppercase animate-pulse">The House of Monacans</div>
        <button onclick="startExperience()" class="px-14 py-6 border border-white/20 text-[10px] tracking-[0.8em] hover:bg-white hover:text-black transition-all duration-700 uppercase">
            Begin Experience
        </button>
    </div>

    <div id="main-site" style="opacity: 0; transition: opacity 2s ease;">
        <nav class="fixed w-full z-[100] px-10 py-8 flex justify-between items-center mix-blend-difference">
            <div class="text-xl font-light tracking-[0.3em] uppercase serif">MONACAN PRESTIGE</div>
            <div class="hidden md:flex gap-12 text-[9px] uppercase tracking-[0.4em]">
                <a href="#inventory" class="hover:opacity-40 transition">Our Cars</a>
                <a href="#accessories" class="hover:opacity-40 transition">Accessories</a>
                <a href="#contact" class="hover:opacity-40 transition">Contact Us</a>
            </div>
        </nav>

        <header class="h-screen flex flex-col justify-center items-center text-center relative overflow-hidden">
            <div class="hero-bg-road"></div>
            
            <audio id="track1"><source src="enginesound.m4a" type="audio/mp4"></audio>
            <audio id="track2" loop><source src="myeyes.m4a" type="audio/mp4"></audio>

            <div class="relative z-10 reveal active px-4">
                <h1 class="text-6xl md:text-8xl font-bold tracking-tighter leading-none mb-6 italic uppercase hero-text-shadow">
                    The Rhythm <br>of the Road.
                </h1>
                <p class="text-gray-400 text-[11px] tracking-[1.5em] uppercase font-light">Curating the Exceptional</p>
            </div>

            <div onclick="toggleMusic()" class="absolute bottom-12 right-12 z-[100] cursor-pointer group">
                <div class="flex items-center gap-4 border border-white/10 px-6 py-3 rounded-full hover:bg-white/10 transition">
                    <div id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></div>
                    <span id="musicText" class="text-[8px] tracking-[0.4em] uppercase opacity-50">Atmosphere Off</span>
                </div>
            </div>
        </header>

        <section id="inventory" class="py-40 px-10 max-w-[1400px] mx-auto">
            <h2 class="text-5xl font-light serif mb-32 reveal italic uppercase">The <span class="font-bold">Stable</span></h2>

            <div class="grid md:grid-cols-3 gap-16">
                <div class="reveal group cursor-pointer" onclick="openDetails('Honda Jazz 2014', '£7,995', '1.3L i-VTEC', ['rhjazz14/rhjazz1.jpg'])">
                    <div class="glass-card p-4 mb-6 overflow-hidden">
                        <img src="rhjazz14/rhjazz1.jpg" class="product-image w-full aspect-video object-cover" onerror="this.src='https://via.placeholder.com/600x400/111/fff?text=Car+Image'">
                    </div>
                    <h3 class="text-lg serif italic">Honda Jazz 2014</h3>
                </div>

                <div class="reveal group cursor-pointer" onclick="openDetails('Nissan Micra', '£4,995', '1.2L Engine', ['nmicra.png'])">
                    <div class="glass-card p-4 mb-6 overflow-hidden">
                        <img src="nmicra.png" class="product-image w-full aspect-video object-cover" onerror="this.src='https://via.placeholder.com/600x400/111/fff?text=Car+Image'">
                    </div>
                    <h3 class="text-lg serif italic">Nissan Micra</h3>
                </div>
            </div>

            <div id="extra-inventory" class="hidden mt-16 grid md:grid-cols-3 gap-16">
                 <div class="reveal group cursor-pointer" onclick="openDetails('VW Polo', '£5,995', '1.2L', ['vwpolo1.png'])">
                    <div class="glass-card p-4 mb-6 overflow-hidden">
                        <img src="vwpolo1.png" class="product-image w-full aspect-video object-cover" onerror="this.src='https://via.placeholder.com/600x400/111/fff?text=Car+Image'">
                    </div>
                    <h3 class="text-lg serif italic">VW Polo</h3>
                </div>
            </div>

            <div class="mt-24 text-center">
                <button id="viewMoreBtn" onclick="toggleViewMore()" class="text-[10px] tracking-[0.8em] uppercase opacity-40 hover:opacity-100 transition border-b border-white/20 pb-2">Discover More</button>
            </div>
        </section>

        <section id="contact" class="py-60 px-10 bg-[#080808] text-center">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-5xl font-light tracking-tighter mb-20 reveal">START YOUR <b>JOURNEY</b></h2>
                <div class="grid md:grid-cols-2 gap-20">
                    <form class="space-y-6 text-left reveal">
                        <input type="text" placeholder="NAME" class="w-full bg-white/5 border border-white/10 p-5 rounded-xl text-sm tracking-widest focus:outline-none focus:border-white/40">
                        <input type="text" placeholder="INTERESTED VEHICLE" class="w-full bg-white/5 border border-white/10 p-5 rounded-xl text-sm tracking-widest focus:outline-none focus:border-white/40">
                        <textarea placeholder="MESSAGE" rows="4" class="w-full bg-white/5 border border-white/10 p-5 rounded-xl text-sm tracking-widest focus:outline-none focus:border-white/40"></textarea>
                        <button type="submit" class="w-full bg-white text-black py-5 rounded-xl font-bold text-[10px] tracking-[0.3em] hover:bg-gray-200 transition">SEND INQUIRY</button>
                    </form>
                    
                    <div class="text-left flex flex-col justify-center space-y-10 reveal">
                        <a href="tel:07480446676" class="block border-b border-white/10 pb-6 group">
                            <span class="text-xs text-gray-500 block mb-2 tracking-widest">CALL SPECIALIST</span>
                            <span class="text-2xl font-light group-hover:pl-4 transition-all">07480446676 →</span>
                        </a>
                        <p class="opacity-40 text-[10px] tracking-widest uppercase">Private Showroom <br> By Appointment Only</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="carModal" class="fixed inset-0 bg-black/98 z-[20000] hidden flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="max-w-5xl w-full max-h-[90vh] overflow-y-auto bg-neutral-900 border border-white/10 p-10 rounded-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-white/50 hover:text-white text-2xl">✕</button>
            <div id="modalContent">
                <h2 id="modalTitle" class="text-4xl serif italic mb-2"></h2>
                <p id="modalPrice" class="text-gray-400 mb-10 tracking-widest uppercase text-sm"></p>
                <div id="modalGallery" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10"></div>
                <button class="w-full py-6 border border-white/20 text-[10px] tracking-[1em] hover:bg-white hover:text-black transition uppercase">Reserve This Piece</button>
            </div>
        </div>
    </div>

    <script>
        const car = document.getElementById('floating-car');
        const t1 = document.getElementById('track1');
        const t2 = document.getElementById('track2');
        const mText = document.getElementById('musicText');
        const dot = document.getElementById('status-dot');
        let playing = false;

        // Start Experience fixed
        function startExperience() {
            document.getElementById('enter-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('enter-overlay').style.display = 'none';
                document.getElementById('main-site').style.opacity = '1';
                car.style.opacity = '0.3';
            }, 1000);

            playing = true;
            t1.play();
            t1.onended = () => { if(playing) t2.play(); };
            mText.innerText = "Atmosphere On";
            dot.classList.replace('bg-red-500', 'bg-green-500');
        }

        function toggleMusic() {
            if (playing) {
                t1.pause(); t2.pause();
                mText.innerText = "Atmosphere Off";
                dot.classList.replace('bg-green-500', 'bg-red-500');
            } else {
                if (!t1.ended) t1.play(); else t2.play();
                mText.innerText = "Atmosphere On";
                dot.classList.replace('bg-red-500', 'bg-green-500');
            }
            playing = !playing;
        }

        // Corrected Mouse Follow Logic
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Use requestAnimationFrame for smoother performance
            window.requestAnimationFrame(() => {
                car.style.left = `${x - 100}px`;
                car.style.top = `${y - 60}px`;
                
                const rX = (window.innerHeight / 2 - y) / 30;
                const rY = (window.innerWidth / 2 - x) / 30;
                car.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
            });
        });

        // Modal Logic
        function openDetails(name, price, engine, images) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = `${price} | ${engine}`;
            const gallery = document.getElementById('modalGallery');
            gallery.innerHTML = '';
            
            images.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "w-full rounded-lg border border-white/5 object-cover aspect-video";
                img.onerror = () => img.src = 'https://via.placeholder.com/600x400/111/fff?text=View+Image';
                gallery.appendChild(img);
            });

            document.getElementById('carModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('carModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleViewMore() {
            const extra = document.getElementById('extra-inventory');
            const btn = document.getElementById('viewMoreBtn');
            const isHidden = extra.classList.contains('hidden');
            
            if (isHidden) {
                extra.classList.remove('hidden');
                extra.classList.add('grid');
                btn.innerText = "Show Less";
                reveal();
            } else {
                extra.classList.add('hidden');
                extra.classList.remove('grid');
                btn.innerText = "Discover More";
            }
        }

        // Scroll Reveal
        const reveal = () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight * 0.9) {
                    el.classList.add('active');
                }
            });
        };
        window.addEventListener('scroll', reveal);
        reveal();
    </script>
</body>
</html>
